# Simulation-only configuration for position_control visualization.
# Keep hardware-facing direction/zero_offset and limits unchanged.
# Override right-leg default_q so the standing pose is visually mirrored in URDF.

joints:
  - name: FR_hip
    motor_id: 0
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.484
    q_max: 0.521
    direction: 1
    zero_offset: 0.0

  - name: FR_thigh
    motor_id: 1
    gear_ratio: 6.33
    default_q: 0.37373
    q_min: -0.650
    q_max: 3.156
    direction: 1
    zero_offset: -1.254

  - name: FR_calf
    motor_id: 2
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.554
    direction: -1
    zero_offset: 2.791

  - name: FL_hip
    motor_id: 3
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.533
    q_max: 0.467
    direction: 1
    zero_offset: 0.0

  - name: FL_thigh
    motor_id: 4
    gear_ratio: 6.33
    default_q: -0.37373
    q_min: -3.133
    q_max: 0.663
    direction: 1
    zero_offset: 1.254

  - name: FL_calf
    motor_id: 5
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.554
    q_max: 0.000
    direction: -1
    zero_offset: -2.791

  - name: RR_hip
    motor_id: 6
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.523
    q_max: 0.489
    direction: 1
    zero_offset: 0.0

  - name: RR_thigh
    motor_id: 7
    gear_ratio: 6.33
    default_q: 0.826636
    q_min: -0.644
    q_max: 3.155
    direction: 1
    zero_offset: -1.254

  - name: RR_calf
    motor_id: 8
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.538
    direction: -1
    zero_offset: 2.791

  - name: RL_hip
    motor_id: 9
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.479
    q_max: 0.524
    direction: 1
    zero_offset: 0.0

  - name: RL_thigh
    motor_id: 10
    gear_ratio: 6.33
    default_q: -0.826636
    q_min: -3.143
    q_max: 0.651
    direction: 1
    zero_offset: 1.254

  - name: RL_calf
    motor_id: 11
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.544
    q_max: 0.000
    direction: -1
    zero_offset: -2.791

control:
  serial_port_front: /dev/ttyUSB0
  serial_port_rear: /dev/ttyUSB1
  motor_hz: 1000.0
  policy_hz: 50.0
  kp: 1.5
  kd: 0.2
  action_scale:
    front:
      hip: 0.025
      thigh: 0.035
      calf: 0.02
    rear:
      hip: 0.03
      thigh: 0.045
      calf: 0.025

standup:
  hold_duration: 2.0
  ramp_duration: 8.0

gait:
  stance_height: 0.28
  step_height: 0.06
  gait_freq: 2.0
  max_stride_x: 0.08
  max_stride_y: 0.04
  idle_timeout: 1.0
  safety_limit_window: 0.5
  safety_limit_ratio: 0.8
  max_cmd_vx: 0.15
  max_cmd_vy: 0.08
  max_cmd_yaw: 0.4
  max_joint_speed: 2.0
  fault_hold_kp: 0.8
  fault_hold_kd: 0.2
