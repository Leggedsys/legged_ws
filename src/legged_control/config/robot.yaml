# Robot configuration for quadruped with 12 Unitree GO-M8010-6 motors.
#
# default_q: standing pose joint angles in radians.
# Tune these values to match the actual robot's neutral standing posture.
# q_min/q_max: joint limits (rad). Motors will be clamped to these before sending.
# gear_ratio: total reduction ratio from joint to motor shaft (motor_gearbox × mechanical).
#   motor_bus_node divides readings by gear_ratio and multiplies commands by gear_ratio.
#   If omitted, falls back to sdk.queryGearRatio() (motor internal ratio only).
#
# PD gains are applied by the motor driver:
#   tau = kp * (target_q - q_actual) + kd * (0 - dq_actual)
#
# direction / zero_offset: URDF alignment (used by kinematics/gait_node and simulation bridges, NOT by motor_bus_node).
#   q_urdf = direction * q_motor + zero_offset
#   direction:   +1 if motor positive direction == URDF positive direction, -1 if reversed.
#   zero_offset: static offset in URDF frame (rad); determined by hand measurement or URDF inspection.
#   q_motor is the value published on /<ns>/joint_states (gear-ratio-corrected,
#   power-on offset already subtracted by _calibrate_offsets).

joints:
  # Canonical order for observation/action vectors (index 0-11)
  - name: FR_hip
    motor_id: 0
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.484
    q_max:  0.521
    direction:    1
    zero_offset:  0.0

  - name: FR_thigh
    motor_id: 1
    gear_ratio: 6.33
    default_q:  0.37373
    q_min: -0.650
    q_max:  3.156
    direction:    1
    zero_offset:  -1.254

  - name: FR_calf
    motor_id: 2
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.554
    direction:    -1
    zero_offset:  2.791

  - name: FL_hip
    motor_id: 3
    gear_ratio: 6.33
    default_q:  0.0
    q_min: -0.533
    q_max:  0.467
    direction:    1
    zero_offset:  0.0

  - name: FL_thigh
    motor_id: 4
    gear_ratio: 6.33
    default_q: -0.37373
    q_min: -3.133
    q_max: 0.663
    direction:    1
    zero_offset:  1.254

  - name: FL_calf
    motor_id: 5
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.554
    q_max: 0.000
    direction:    -1
    zero_offset:  -2.791

  - name: RR_hip
    motor_id: 6
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.523
    q_max:  0.489
    direction:    1
    zero_offset:  0.0

  - name: RR_thigh
    motor_id: 7
    gear_ratio: 6.33
    default_q:  0.37373
    q_min: -0.644
    q_max:  3.155
    direction:    1
    zero_offset:  -1.254

  - name: RR_calf
    motor_id: 8
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.538
    direction:    -1
    zero_offset:  2.791

  - name: RL_hip
    motor_id: 9
    gear_ratio: 6.33
    default_q:  0.0
    q_min: -0.479
    q_max:  0.524
    direction:    1
    zero_offset:  0.0

  - name: RL_thigh
    motor_id: 10
    gear_ratio: 6.33
    default_q: -0.37373
    q_min: -3.143
    q_max:  0.651
    direction:    1
    zero_offset:  1.254

  - name: RL_calf
    motor_id: 11
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.544
    q_max: 0.000
    direction:    -1
    zero_offset:  -2.791

control:
  serial_port_front: /dev/ttyUSB0   # FR, FL legs
  serial_port_rear:  /dev/ttyUSB1   # RR, RL legs
  motor_hz: 1000.0
  kp: 2.2
  kd: 0.30

teleop:
  max_vx:  0.30  # m/s  forward/backward
  max_vy:  0.02  # m/s  lateral
  max_yaw: 0.1   # rad/s yaw rate
  deadzone: 0.05  # joystick axis deadzone (fraction of full range)
  btn_posture_toggle: 0  # A button: toggle stand up / lie down
  # Axis mapping (standard gamepad layout):
  #   axis_vx:  left stick vertical   (typically axis 1, inverted)
  #   axis_vy:  left stick horizontal (typically axis 0, inverted)
  #   axis_yaw: right stick horizontal (typically axis 3, inverted)
  axis_vx:  1
  axis_vy:  0
  axis_yaw: 3
  invert_vx:  false
  invert_vy:  false
  invert_yaw: true
  # Emergency stop button index on gamepad.
  # -1 = not configured; set automatically by calibrate.py during Phase 0.
  btn_emergency_stop: -1
  axis_lt: 4          # left trigger axis  (observed as 5th /joy axis)
  axis_rt: 5          # right trigger axis (observed as 6th /joy axis)
  max_dz:  0.03       # m/s height rate limit

standup:
  hold_duration: 5.0   # seconds to hold at 0 before ramping (let motors settle)
  ramp_duration: 8.0   # seconds for 0 → default_q smooth-step ramp
  lie_down_duration: 2.0   # seconds for default_q → 0 smooth-step ramp

gait:
  stance_height:  0.28
  step_height:    0.07
  gait_freq:      1.0
  max_stride_x:   0.15
  max_stride_y:   0.04
  yaw_stride_scale: 1.8
  idle_timeout:   1.0
  safety_limit_window: 1.0
  safety_limit_ratio:  0.95
  tracking_error_threshold: 0.45
  tracking_error_window: 0.6
  tracking_error_ratio: 0.95
  tracking_error_grace_period: 2.0
  max_cmd_vx:     0.30
  max_cmd_vy:     0.00
  max_cmd_yaw:    0.08
  max_joint_speed: 1.1
  motion_blend_duration: 0.6
  stance_height_min: 0.20   # m
  stance_height_max: 0.35   # m
  fault_hold_kp:  0.8
  fault_hold_kd:  0.2
