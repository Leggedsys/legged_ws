# Robot configuration for quadruped with 12 Unitree GO-M8010-6 motors.
#
# default_q: standing pose joint angles in radians.
# Tune these values to match the actual robot's neutral standing posture.
# q_min/q_max: joint limits (rad). Motors will be clamped to these before sending.
# gear_ratio: total reduction ratio from joint to motor shaft (motor_gearbox × mechanical).
#   motor_bus_node divides readings by gear_ratio and multiplies commands by gear_ratio.
#   If omitted, falls back to sdk.queryGearRatio() (motor internal ratio only).
#
# PD gains are applied by the motor driver (not the policy):
#   tau = kp * (target_q - q_actual) + kd * (0 - dq_actual)
#
# direction / zero_offset: URDF alignment (used by policy_node, NOT by motor_bus_node).
#   q_urdf = direction * q_motor + zero_offset
#   direction:   +1 if motor positive direction == URDF positive direction, -1 if reversed.
#   zero_offset: static offset in URDF frame (rad); determined by hand measurement or URDF inspection.
#   q_motor is the value published on /<ns>/joint_states (gear-ratio-corrected,
#   power-on offset already subtracted by _calibrate_offsets).

joints:
  # Canonical order for observation/action vectors (index 0-11)
  - name: FR_hip
    motor_id: 0
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.484
    q_max:  0.521
    direction:    1
    zero_offset:  0.0

  - name: FR_thigh
    motor_id: 1
    gear_ratio: 6.33
    default_q:  0.37373
    q_min: -0.650
    q_max:  3.156
    direction:    1
    zero_offset:  -1.254

  - name: FR_calf
    motor_id: 2
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.554
    direction:    -1
    zero_offset:  2.791

  - name: FL_hip
    motor_id: 3
    gear_ratio: 6.33
    default_q:  0.0
    q_min: -0.533
    q_max:  0.467
    direction:    1
    zero_offset:  0.0

  - name: FL_thigh
    motor_id: 4
    gear_ratio: 6.33
    default_q: -0.37373
    q_min: -3.133
    q_max: 0.663
    direction:    1
    zero_offset:  1.254

  - name: FL_calf
    motor_id: 5
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.554
    q_max: 0.000
    direction:    -1
    zero_offset:  -2.791

  - name: RR_hip
    motor_id: 6
    gear_ratio: 6.33
    default_q: 0.0
    q_min: -0.523
    q_max:  0.489
    direction:    1
    zero_offset:  0.0

  - name: RR_thigh
    motor_id: 7
    gear_ratio: 6.33
    default_q:  0.37373
    q_min: -0.644
    q_max:  3.155
    direction:    1
    zero_offset:  -1.254

  - name: RR_calf
    motor_id: 8
    gear_ratio: 12.66
    default_q: 1.488672
    q_min: 0.000
    q_max: 5.538
    direction:    -1
    zero_offset:  2.791

  - name: RL_hip
    motor_id: 9
    gear_ratio: 6.33
    default_q:  0.0
    q_min: -0.479
    q_max:  0.524
    direction:    1
    zero_offset:  0.0

  - name: RL_thigh
    motor_id: 10
    gear_ratio: 6.33
    default_q: -0.37373
    q_min: -3.143
    q_max:  0.651
    direction:    1
    zero_offset:  1.254

  - name: RL_calf
    motor_id: 11
    gear_ratio: 12.66
    default_q: -1.488672
    q_min: -5.544
    q_max: 0.000
    direction:    -1
    zero_offset:  -2.791

control:
  serial_port_front: /dev/ttyUSB0   # FR, FL legs
  serial_port_rear:  /dev/ttyUSB1   # RR, RL legs
  motor_hz: 1000.0
  policy_hz: 50.0
  kp: 1.3
  kd: 0.02
  # Policy action is interpreted as delta from default_q, then scaled per joint.
  # target_q[i] = default_q[i] + action_scale[leg_group][joint_type] * action[i]
  # leg_group: 'front' (FR/FL) or 'rear' (RR/RL); joint_type: 'hip', 'thigh', 'calf'
  action_scale:
    front:
      hip:   0.025
      thigh: 0.035
      calf:  0.02
    rear:
      hip:   0.03
      thigh: 0.045
      calf:  0.025

teleop:
  max_vx:  0.05  # m/s  forward/backward
  max_vy:  0.02  # m/s  lateral
  max_yaw: 0.1   # rad/s yaw rate
  deadzone: 0.05  # joystick axis deadzone (fraction of full range)
  # Axis mapping (standard gamepad layout):
  #   axis_vx:  left stick vertical   (typically axis 1, inverted)
  #   axis_vy:  left stick horizontal (typically axis 0, inverted)
  #   axis_yaw: right stick horizontal (typically axis 3, inverted)
  axis_vx:  1
  axis_vy:  0
  axis_yaw: 3
  invert_vx:  true
  invert_vy:  false
  invert_yaw: true
  # Emergency stop button index on gamepad.
  # -1 = not configured; set automatically by calibrate.py during Phase 0.
  btn_emergency_stop: -1

standup:
  hold_duration: 5.0   # seconds to hold at 0 before ramping (let motors settle)
  ramp_duration: 8.0   # seconds for 0 → default_q smooth-step ramp

gait:
  stance_height:  0.28
  step_height:    0.06
  gait_freq:      2.0
  max_stride_x:   0.08
  max_stride_y:   0.04
  idle_timeout:   1.0
  safety_limit_window: 0.5
  safety_limit_ratio:  0.8
  max_cmd_vx:     0.03
  max_cmd_vy:     0.00
  max_cmd_yaw:    0.08
  max_joint_speed: 0.5
  motion_blend_duration: 0.6
  fault_hold_kp:  0.8
  fault_hold_kd:  0.2

policy:
  # Path to TorchScript model file (.pt). Node will not start if empty — set before launching.
  model_path: '/home/grayerd/Desktop/Projects/rc/legged_ws/models/policy.pt'
  # Observation normalization (mean and std for each of the 45 dims).
  # Leave empty to use no normalization (raw values passed to model).
  obs_mean: []
  obs_std:  []
